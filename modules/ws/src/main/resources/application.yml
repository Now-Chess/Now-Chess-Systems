quarkus:
  http:
    port: 8084
    auth:
      permission:
        metrics:
          paths:
            - /q/metrics
            - /q/health/*
          policy: permit
  application:
    name: nowchess-ws
  redis:
    hosts: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

nowchess:
  redis:
    host: localhost
    port: 6379
    prefix: nowchess
  internal:
    secret: ${INTERNAL_SECRET:123abc}

"%dev":
  nowchess:
    redis:
      host: localhost
      port: 6379
      prefix: nowchess
  mp:
    jwt:
      verify:
        publickey:
          location: keys/public.pem
        issuer: nowchess

"%deployed":
  quarkus:
    log:
      console:
        json: true
    otel:
      traces:
        sampler: parentbased_traceidratio
        sampler-arg: 0.1
      exporter:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  nowchess:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      prefix: ${REDIS_PREFIX:nowchess}
  mp:
    jwt:
      verify:
        publickey:
          location: ${JWT_PUBLIC_KEY_PATH:keys/public.pem}
        issuer: nowchess
