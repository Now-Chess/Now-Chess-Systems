quarkus:
  http:
    port: 8084
  application:
    name: nowchess-ws
  redis:
    hosts: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}

nowchess:
  redis:
    host: localhost
    port: 6379
    prefix: nowchess

"%dev":
  nowchess:
    redis:
      host: localhost
      port: 6379
      prefix: nowchess
  mp:
    jwt:
      verify:
        publickey:
          location: keys/public.pem
        issuer: nowchess

"%deployed":
  nowchess:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      prefix: ${REDIS_PREFIX:nowchess}
  mp:
    jwt:
      verify:
        publickey:
          location: ${JWT_PUBLIC_KEY_PATH:keys/public.pem}
        issuer: nowchess
