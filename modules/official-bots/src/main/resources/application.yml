quarkus:
  http:
    port: 8088
    auth:
      permission:
        metrics:
          paths:
            - /q/metrics
            - /q/health/*
          policy: permit
  application:
    name: nowchess-official-bots
  redis:
    hosts: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  smallrye-jwt:
    enabled: true
  log:
    level: INFO

nowchess:
  redis:
    host: localhost
    port: 6379
    prefix: nowchess

"%deployed":
  quarkus:
    log:
      console:
        json: true
    otel:
      traces:
        sampler: parentbased_traceidratio
        sampler-arg: 0.1
      exporter:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  nowchess:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      prefix: ${REDIS_PREFIX:nowchess}
