quarkus:
  http:
    port: 8083
  application:
    name: nowchess-account
  redis:
    hosts: redis://${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  rest-client:
    core-service:
      url: http://localhost:8080
  smallrye-openapi:
    info-title: NowChess Account Service
    path: /openapi
  swagger-ui:
    path: /swagger-ui
  datasource:
    db-kind: postgresql
    username: ${DB_USER:nowchess}
    password: ${DB_PASSWORD:nowchess}
    jdbc:
      url: ${DB_URL:jdbc:postgresql://localhost:5432/nowchess}
  hibernate-orm:
    schema-management:
      strategy: update

nowchess:
  redis:
    host: localhost
    port: 6379
    prefix: nowchess
  internal:
    secret: 123abc

"%test":
  quarkus:
    datasource:
      db-kind: h2
      username: sa
      password: ""
      jdbc:
        url: jdbc:h2:mem:nowchess;DB_CLOSE_DELAY=-1
    hibernate-orm:
      schema-management:
        strategy: drop-and-create

"%dev":
  quarkus:
    datasource:
      db-kind: h2
      username: sa
      password: ""
      jdbc:
        url: jdbc:h2:mem:nowchess;DB_CLOSE_DELAY=-1
    hibernate-orm:
      schema-management:
        strategy: drop-and-create

"%deployed":
  quarkus:
    rest-client:
      core-service:
        url: ${CORE_SERVICE_URL}
    datasource:
      db-kind: postgresql
      username: ${DB_USER}
      password: ${DB_PASSWORD}
      jdbc:
        url: ${DB_URL}
    hibernate-orm:
      schema-management:
        strategy: update
  nowchess:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      prefix: ${REDIS_PREFIX:nowchess}
    internal:
      secret: ${INTERNAL_SECRET}
  mp:
    jwt:
      verify:
        publickey:
          location: ${JWT_PUBLIC_KEY_PATH:keys/public.pem}
        issuer: nowchess
  smallrye:
    jwt:
      sign:
        key:
          location: ${JWT_PRIVATE_KEY_PATH:keys/private.pem}
