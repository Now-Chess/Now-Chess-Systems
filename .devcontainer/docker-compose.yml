services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    command: sleep infinity
    init: true
    volumes:
      - gradle-cache:/home/vscode/.gradle
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PREFIX: nowchess
      DB_URL: jdbc:postgresql://postgres:5432/nowchess
      DB_USER: nowchess
      DB_PASSWORD: nowchess
      CORE_SERVICE_URL: http://localhost:8080
      INTERNAL_SECRET: dev-internal-secret
      STOCKFISH_PATH: /usr/games/stockfish
      NOWCHESS_COORDINATOR_ENABLED: "true"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  redis:
    image: docker.io/redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s

  postgres:
    image: docker.io/postgres:16-alpine
    environment:
      POSTGRES_DB: nowchess
      POSTGRES_USER: nowchess
      POSTGRES_PASSWORD: nowchess
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

volumes:
  gradle-cache:
  redis-data:
  postgres-data:

